name: CI with SonarQube

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: self-hosted

    steps:
      # ✅ 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ 2. Debug: list files
      - name: List files
        run: dir

      # ✅ 3. Verify runner works
      - name: Test runner
        run: echo "✅ Runner is working"

      # ✅ 4. SonarQube Scan (FIXED)
      - name: SonarQube Scan
        shell: cmd
        run: |
          docker run --rm ^
            -e SONAR_HOST_URL=http://localhost:9000 ^
            -e SONAR_LOGIN=%SONAR_TOKEN% ^
            -v %cd%:/usr/src ^
            sonarsource/sonar-scanner-cli ^
            -Dsonar.projectKey=argocd-project ^
            -Dsonar.projectName=ArgoCD_Project ^
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
