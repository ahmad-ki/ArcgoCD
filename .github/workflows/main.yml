name: Full CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  ci:
    runs-on: self-hosted

    steps:
      # ✅ 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ 2. Debug (verify files)
      - name: List files
        shell: cmd
        run: dir

      # ✅ 3. Check SONAR_TOKEN (DEBUG - REMOVE LATER)
      - name: Check Token
        shell: cmd
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: echo SONAR_TOKEN=%SONAR_TOKEN%

      # ✅ 4. SonarQube Scan ✅
      - name: SonarQube Scan
        shell: cmd
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          docker run --rm
          -e SONAR_HOST_URL=http://host.docker.internal:9000
          -e SONAR_LOGIN=%SONAR_TOKEN%
          -v "%GITHUB_WORKSPACE%:/usr/src"
          sonarsource/sonar-scanner-cli
          -Dsonar.projectKey=ahmad
          -Dsonar.projectName=ahmad
          -Dsonar.sources=.

      # ✅ 5. Build Docker image ✅
      - name: Build Docker Image
        shell: cmd
        run: docker build -t ahmad-app:latest .

      # ✅ 6. List Docker images
      - name: Verify Docker images
        shell: cmd
        run: docker images
