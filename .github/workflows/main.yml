name: CI with SonarQube

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: self-hosted

    steps:
      # ✅ 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ 2. Debug - list files
      - name: List files
        run: dir

      # ✅ 3. Test runner
      - name: Test runner
        run: echo "✅ Runner working"

      # ✅ 4. SonarQube Scan
      - name: SonarQube Scan
        run: |
          docker run --rm `
            -e SONAR_HOST_URL=http://localhost:9000 `
            -e SONAR_LOGIN=${{ secrets.SONAR_TOKEN }} `
            -v "${{ github.workspace }}:/usr/src" `
            sonarsource/sonar-scanner-cli `
            -Dsonar.projectKey=argocd-project `
            -Dsonar.projectName="ArgoCD Project" `
            -Dsonar.sources=. `
            -Dsonar.sourceEncoding=UTF-8
