name: CI with SonarQube

on:
  push:
    branches: [ "main" ]

jobs:
  sonar:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SonarQube Scan
        shell: cmd
        run: docker run --rm -e SONAR_HOST_URL=http://host.docker.internal:9000 -e SONAR_LOGIN=%SONAR_TOKEN% -v "%GITHUB_WORKSPACE%:/usr/src" sonarsource/sonar-scanner-cli -Dsonar.projectKey=argocd-project -Dsonar.projectName=ArgoCD_Project -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
