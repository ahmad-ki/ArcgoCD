name: CI with SonarQube

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: self-hosted   # ✅ IMPORTANT (your local runner)

    steps:
      # ✅ 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ 2. Show files (debug)
      - name: List repository files
        run: dir

      # ✅ 3. Test pipeline
      - name: Test pipeline working
        run: echo "✅ Runner working!"

      # ✅ 4. SonarQube Scan
      - name: SonarQube Scan
        run: |
          docker run --rm `
            -e SONAR_HOST_URL=http://localhost:9000 `
            -e SONAR_LOGIN=${{ secrets.SONAR_TOKEN }} `
            -v "${{ github.workspace }}:/usr/src" `
            sonarsource/sonar-scanner-cli `
            -Dsonar.projectKey=argocd-project `
            -Dsonar.sources=/usr/src
