name: Full CI Pipeline

on:
  push:
    branches: ["main"]

  workflow_dispatch:

jobs:
  ci:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files
        shell: cmd
        run: |
          dir
          dir arch-builder

      # ✅ Test SonarQube connection first
      - name: Test SonarQube connection
        shell: cmd
        run: docker run --rm curlimages/curl http://host.docker.internal:9000/api/system/status

      # ✅ SonarQube Scan
      - name: SonarQube Scan
        shell: cmd
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          docker run --rm
          -e SONAR_HOST_URL=http://host.docker.internal:9000
          -e SONAR_TOKEN=%SONAR_TOKEN%
          -v "%GITHUB_WORKSPACE%:/usr/src"
          sonarsource/sonar-scanner-cli
          "-Dsonar.projectKey=ahmad-ki_ArcgoCD_decced61-67d3-403f-9ba8-56db1d5d2758"
          "-Dsonar.sources=arch-builder/backend,arch-builder/frontend"
          "-Dsonar.qualitygate.wait=true"

      - name: Validate project folders
        shell: cmd
        run: |
          if exist arch-builder\backend (
            echo backend OK
          ) else (
            echo backend missing
            exit /b 1
          )

          if exist arch-builder\frontend (
            echo frontend OK
          ) else (
            echo frontend missing
            exit /b 1
          )

      - name: Build Docker Image
        shell: cmd
        run: docker build -t ahmad-app:latest arch-builder

      - name: Verify Docker images
        shell: cmd
        run: docker images
