@'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiktok-frontend
  namespace: default
  labels:
    app: tiktok
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tiktok
  template:
    metadata:
      labels:
        app: tiktok
    spec:
      containers:
      - name: web
        image: nginxdemos/hello:plain-text
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: tiktok-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: tiktok
'@ | Out-File -FilePath "tiktok-app.yaml" -Encoding utf8