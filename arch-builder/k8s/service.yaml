apiVersion: v1
kind: Service
metadata:
  name: arch-builder-frontend-svc
  namespace: production
spec:
  selector:
    app: arch-builder-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP   # L4 — internal cluster routing
---
apiVersion: v1
kind: Service
metadata:
  name: arch-builder-backend-svc
  namespace: production
spec:
  selector:
    app: arch-builder-backend
  ports:
  - name: api
    port: 3000
    targetPort: 3000
  type: ClusterIP   # L4 — internal cluster routing