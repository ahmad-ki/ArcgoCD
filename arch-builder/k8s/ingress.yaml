apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arch-builder-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - arch-builder.yourdomain.com
    secretName: arch-builder-tls
  rules:
  - host: arch-builder.yourdomain.com
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: arch-builder-backend-svc
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: arch-builder-frontend-svc
            port:
              number: 80