# ==============================
# FRONTEND DEPLOYMENT
# ==============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-builder-frontend
  namespace: default
  labels:
    app: arch-builder-frontend
    version: "3.4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arch-builder-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arch-builder-frontend
    spec:
      containers:
      - name: frontend
        image: ahmadki123/smart-advisor-v3-frontend:v3.4
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        # ✅ FIXED (no /health dependency)
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10

        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
# ==============================
# BACKEND DEPLOYMENT
# ==============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-builder-backend
  namespace: default
  labels:
    app: arch-builder-backend
    version: "3.3"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arch-builder-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arch-builder-backend
    spec:
      containers:
      - name: backend
        image: ahmadki123/smart-advisor-v3-backend:v3.3
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"

        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"

        # ✅ FIXED (no /health dependency)
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15

        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
