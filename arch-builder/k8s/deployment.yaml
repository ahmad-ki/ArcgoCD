# ==============================
# FRONTEND (NGINX)
# ==============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-builder-frontend
  namespace: default
  labels:
    app: arch-builder-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arch-builder-frontend
  template:
    metadata:
      labels:
        app: arch-builder-frontend
    spec:
      containers:
      - name: frontend
        image: ahmadki123/smart-advisor-v3-frontend@sha256:af5b4e04e057a2fc97abbb9cf94d6d5249c996cd31ac0009654f0e77522f3938 ✅
        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
# ==============================
# BACKEND (NODE)
# ==============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-builder-backend
  namespace: default
  labels:
    app: arch-builder-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arch-builder-backend
  template:
    metadata:
      labels:
        app: arch-builder-backend
    spec:
      containers:
      - name: backend
        image: ahmadki123/smart-advisor-v3-backend@sha256:810075a86f4455bdc00374d52ebc2d285ff63e6877fdbe08e2b021dfddcc8342 ✅
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi

        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"

        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15

        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
