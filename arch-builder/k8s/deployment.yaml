# ==============================
# FRONTEND (NGINX - PORT 80)
# ==============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-builder-frontend
  namespace: default
  labels:
    app: arch-builder-frontend
    version: "3.4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arch-builder-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arch-builder-frontend
    spec:
      containers:
      - name: frontend
        image: ahmadki123/smart-advisor-v3-frontend:v3.4
        imagePullPolicy: Always

        ports:
        - containerPort: 80   # ✅ NGINX runs on 80

        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        # ✅ PROBES FIXED (TCP instead of /health)
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
# ==============================
# BACKEND (NODE - PORT 3000)
# ==============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-builder-backend
  namespace: default
  labels:
    app: arch-builder-backend
    version: "3.3"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arch-builder-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arch-builder-backend
    spec:
      containers:
      - name: backend
        image: ahmadki123/smart-advisor-v3-backend:v3.3
        imagePullPolicy: Always

        ports:
        - containerPort: 3000   # ✅ Node app runs on 3000

        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi

        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"

        # ✅ PROBES FIXED
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15

        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
