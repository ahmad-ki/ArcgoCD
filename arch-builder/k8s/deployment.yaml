apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-builder-frontend
  namespace: default   # ✅ unchanged
  labels:
    app: arch-builder-frontend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arch-builder-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arch-builder-frontend
    spec:
      containers:
      - name: frontend
        image: ahmadki123/arch-builder-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-builder-backend
  namespace: default   # ✅ FIXED (was production)
  labels:
    app: arch-builder-backend
    version: "1.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arch-builder-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arch-builder-backend
    spec:
      containers:
      - name: backend
        image: ahmadki123/arch-builder-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
