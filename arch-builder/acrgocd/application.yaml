apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arch-builder
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ahmadki123/ArcgoCD/arch-builder.git
    targetRevision: main
    path: k8s                          # folder containing all YAML files

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true                      # delete removed resources automatically
      selfHeal: true                   # revert any manual kubectl changes
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m